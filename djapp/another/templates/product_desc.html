{% extends "main.html" %}
{% load static %}
{% block title %}Products👟{% endblock %}
{% block content %}
<div class="container mt-3 g-3">
    <div class="row">
        <div class="col-sm-12 col-md-6 col-lg-6 text-center bg-light shadow">
            
            <img src="{{product.image.url}}" style='width:90%; height:23rem;' alt="">
        </div>
        <div class="col-sm-12 col-md-6 col-lg-6 ">
            <div class="card shadow p-4 bg-light" style='min-height:22rem'>
                <h1>{{product.name}}</h1>
                <p class='fs-5'>{{product.desc}}</p>
                <h3>Price:{{product.price}}/-</h3>
                <div class="d-flex justify-content-between mt-3">
                    <a href="{% url "addtocart" product.id %}" class="btn btn-warning">Add TO cart</a>
                    <a href="" class="btn btn-info">Buy Now</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
